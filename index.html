<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub AI v4.2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [cards, setCards] = useState([]);
            const [newCard, setNewCard] = useState({ name: "", memo: "", date: new Date().toISOString().split('T')[0], image: null });

            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedData) setCards(JSON.parse(savedData));

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ko-KR';
                    recognitionRef.current.onresult = (event) => {
                        let current = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            current += event.results[i][0].transcript;
                        }
                        setNewCard(prev => ({ ...prev, memo: current }));
                    };
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, cards, isRecording]);

            const toggleRecording = () => {
                if (isRecording) { recognitionRef.current.stop(); setIsRecording(false); }
                else { recognitionRef.current.start(); setIsRecording(true); }
            };

            const handleCameraClick = () => fileInputRef.current.click();

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setNewCard(prev => ({ ...prev, image: reader.result }));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const saveEntry = () => {
                if (!newCard.name) return alert("회의명이나 성함을 입력하세요.");
                const entry = { ...newCard, id: Date.now() };
                setCards([entry, ...cards]);
                setNewCard({ name: "", memo: "", date: new Date().toISOString().split('T')[0], image: null });
                alert("기록 및 명함이 저장되었습니다!");
            };

            const copyForAI = (card) => {
                const text = `[AI 요약 요청]\n날짜: ${card.date}\n제목: ${card.name}\n내용: ${card.memo}\n(명함 사진 첨부됨)\n\n위 내용을 요약하고 구글 캘린더 등록용 정보를 만들어줘.`;
                navigator.clipboard.writeText(text);
                alert("AI 전달용 텍스트가 복사되었습니다!");
            };

            const openGoogleCalendar = (card) => {
                const base = "https://www.google.com/calendar/render?action=TEMPLATE";
                const details = `${card.memo}${card.image ? '\n(명함 이미지 저장됨)' : ''}`;
                const url = `${base}&text=${encodeURIComponent(card.name)}&details=${encodeURIComponent(details)}&dates=${card.date.replace(/-/g, '')}/${card.date.replace(/-/g, '')}`;
                window.open(url, '_blank');
            };

            // 검색 필터링 로직
            const filteredCards = cards.filter(c => 
                c.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                c.memo.toLowerCase().includes(searchQuery.toLowerCase())
            );

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl overflow-hidden">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg">
                        <h1 className="text-2xl font-bold italic">Meeting Hub v4.2</h1>
                        <p className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest text-right">Card & Voice Assistant</p>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto pb-32">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-around py-4">
                                    <div className="text-center">
                                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}>
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white"></i>
                                        </button>
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">음성 기록</span>
                                    </div>
                                    <div className="text-center">
                                        <button onClick={handleCameraClick} className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center shadow-lg">
                                            <i data-lucide="camera" className="text-white"></i>
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="camera" onChange={handleFileChange} />
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">명함 촬영</span>
                                    </div>
                                </div>

                                {newCard.image && (
                                    <div className="relative w-full h-40 bg-slate-100 rounded-3xl overflow-hidden border-2 border-indigo-200 shadow-inner">
                                        <img src={newCard.image} className="w-full h-full object-cover" />
                                        <button onClick={() => setNewCard({...newCard, image: null})} className="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-full shadow-lg"><i data-lucide="x" className="w-4 h-4"></i></button>
                                    </div>
                                )}

                                <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-xl space-y-4">
                                    <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100" value={newCard.date} onChange={e => setNewCard({...newCard, date: e.target.value})} />
                                    <input type="text" placeholder="성함/회의명" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} />
                                    <textarea placeholder="메모 혹은 음성 인식 내용..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-32 outline-none border border-slate-100" value={newCard.memo} onChange={e => setNewCard({...newCard, memo: e.target.value})}></textarea>
                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">모두 저장하기</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4">
                                <div className="relative mb-6">
                                    <i data-lucide="search" className="absolute left-4 top-3.5 w-4 h-4 text-slate-400"></i>
                                    <input type="text" placeholder="회의명, 메모 검색..." className="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                </div>
                                
                                {filteredCards.length === 0 ? <p className="text-center text-slate-400 py-10 text-sm">기록이 없습니다.</p> : 
                                    filteredCards.map(c => (
                                        <div key={c.id} className="bg-white p-4 rounded-3xl border border-slate-100 shadow-md border-l-4 border-indigo-500 flex flex-col space-y-3">
                                            <div className="flex justify-between items-center">
                                                <div className="flex items-center space-x-3">
                                                    {c.image && <img src={c.image} className="w-10 h-10 rounded-lg object-cover border border-slate-200" />}
                                                    <div>
                                                        <span className="font-bold text-slate-800 block text-sm">{c.name}</span>
                                                        <span className="text-[10px] text-slate-400">{c.date}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => setCards(cards.filter(item => item.id !== c.id))} className="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                            <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl line-clamp-2">{c.memo}</p>
                                            <div className="flex space-x-2">
                                                <button onClick={() => copyForAI(c)} className="flex-1 py-2 bg-slate-800 text-white rounded-xl text-[10px] font-bold">AI 요청 복사</button>
                                                <button onClick={() => openGoogleCalendar(c)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-xl text-[10px] font-bold">캘린더 등록</button>
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 rounded-t-[40px] z-20 shadow-inner">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="plus-circle"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="list"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

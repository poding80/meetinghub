<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub AI v4.1</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [transcript, setTranscript] = useState("");
            const [cards, setCards] = useState([]);
            const [newCard, setNewCard] = useState({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });

            const recognitionRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedData) setCards(JSON.parse(savedData));

                // 브라우저 음성 인식 설정
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ko-KR';

                    recognitionRef.current.onresult = (event) => {
                        let current = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            current += event.results[i][0].transcript;
                        }
                        setTranscript(current);
                        setNewCard(prev => ({ ...prev, memo: current }));
                    };
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, cards, isRecording]);

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current.stop();
                    setIsRecording(false);
                } else {
                    setTranscript("");
                    recognitionRef.current.start();
                    setIsRecording(true);
                }
            };

            const saveEntry = () => {
                if (!newCard.name) return alert("회의명이나 성함을 입력하세요.");
                const entry = { ...newCard, id: Date.now() };
                setCards([entry, ...cards]);
                setNewCard({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });
                setTranscript("");
                alert("기록되었습니다. 이제 이 내용을 AI에게 전달하세요!");
            };

            const copyForAI = (card) => {
                const text = `[회의 요약 요청]\n날짜: ${card.date}\n제목: ${card.name}\n내용: ${card.memo}\n\n위 내용을 요약하고 구글 캘린더 등록용 정보를 만들어줘.`;
                navigator.clipboard.writeText(text);
                alert("AI 전달용 텍스트가 복사되었습니다! Gemini 창에 붙여넣으세요.");
            };

            const openGoogleCalendar = (card) => {
                const base = "https://www.google.com/calendar/render?action=TEMPLATE";
                const url = `${base}&text=${encodeURIComponent(card.name)}&details=${encodeURIComponent(card.memo)}&dates=${card.date.replace(/-/g, '')}/${card.date.replace(/-/g, '')}`;
                window.open(url, '_blank');
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg">
                        <h1 className="text-2xl font-bold italic">Meeting Hub AI v4.1</h1>
                        <p className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest text-right">Hyo-Young's Assistant</p>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto pb-32">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-center py-4">
                                    <div className="text-center">
                                        <button 
                                            onClick={toggleRecording}
                                            className={`w-20 h-20 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}
                                        >
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white w-8 h-8"></i>
                                        </button>
                                        <span className="text-xs mt-3 block font-bold text-slate-500">{isRecording ? "녹음 중... (터치 시 중단)" : "음성 기록 시작"}</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-xl space-y-4">
                                    <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100" value={newCard.date} onChange={e => setNewCard({...newCard, date: e.target.value})} />
                                    <input type="text" placeholder="성함/회의명" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none border border-slate-100" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} />
                                    <div className="relative">
                                        <textarea placeholder="음성 인식 결과가 여기에 표시됩니다..." className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-40 outline-none border border-slate-100" value={newCard.memo} onChange={e => setNewCard({...newCard, memo: e.target.value})}></textarea>
                                        {isRecording && <div className="absolute top-4 right-4 flex space-x-1"><div className="w-2 h-2 bg-red-500 rounded-full animate-bounce"></div></div>}
                                    </div>
                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">기록 저장</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-slate-800 text-lg flex items-center"><i data-lucide="archive" className="mr-2"></i>기록 목록</h2>
                                {cards.length === 0 && <p className="text-center text-slate-400 py-10 text-sm">저장된 기록이 없습니다.</p>}
                                {cards.map(c => (
                                    <div key={c.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-indigo-500 space-y-3">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <span className="font-bold text-slate-800 block text-lg">{c.name}</span>
                                                <span className="text-[10px] text-indigo-500 font-bold">{c.date}</span>
                                            </div>
                                            <button onClick={() => setCards(cards.filter(item => item.id !== c.id))} className="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                        <p className="text-xs text-slate-500 line-clamp-3 bg-slate-50 p-3 rounded-xl">{c.memo}</p>
                                        <div className="flex space-x-2">
                                            <button onClick={() => copyForAI(c)} className="flex-1 py-2 bg-slate-800 text-white rounded-xl text-[10px] font-bold flex items-center justify-center">
                                                <i data-lucide="copy" className="w-3 h-3 mr-1"></i> AI 요약 요청 복사
                                            </button>
                                            <button onClick={() => openGoogleCalendar(c)} className="flex-1 py-2 bg-indigo-100 text-indigo-700 rounded-xl text-[10px] font-bold flex items-center justify-center">
                                                <i data-lucide="calendar" className="w-3 h-3 mr-1"></i> 캘린더 등록
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 rounded-t-[40px] z-20 shadow-inner">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="mic"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="list"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub AI v4.2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [cards, setCards] = useState([]);
            const [newCard, setNewCard] = useState({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });
            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedData) setCards(JSON.parse(savedData));

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ko-KR';
                    recognitionRef.current.onresult = (event) => {
                        let current = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            current += event.results[i][0].transcript;
                        }
                        setNewCard(prev => ({ ...prev, memo: current }));
                    };
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, cards, isRecording]);

            const toggleRecording = () => {
                if (isRecording) { recognitionRef.current.stop(); setIsRecording(false); }
                else { recognitionRef.current.start(); setIsRecording(true); }
            };

            const handleCameraClick = () => fileInputRef.current.click();
            const handleFileChange = (e) => {
                alert("카메라 촬영 완료! 메모란에 명함 정보를 추가로 입력해 주세요.");
                setNewCard(prev => ({ ...prev, name: "명함 확인 필요", memo: prev.memo + "\n[명함 촬영됨]" }));
            };

            const saveEntry = () => {
                if (!newCard.name) return alert("회의명이나 성함을 입력하세요.");
                setCards([{ ...newCard, id: Date.now() }, ...cards]);
                setNewCard({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });
                alert("기록 완료!");
            };

            const copyForAI = (card) => {
                const text = `[회의 요약 요청]\n날짜: ${card.date}\n제목: ${card.name}\n내용: ${card.memo}\n\n위 내용을 요약하고 구글 캘린더 등록용 정보를 만들어줘.`;
                navigator.clipboard.writeText(text);
                alert("복사되었습니다. Gemini에 붙여넣으세요!");
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg">
                        <h1 className="text-2xl font-bold italic">Meeting Hub AI v4.2</h1>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto pb-32 text-slate-800">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-around py-4">
                                    <div className="text-center">
                                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}>
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white"></i>
                                        </button>
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">녹음</span>
                                    </div>
                                    <div className="text-center">
                                        <button onClick={handleCameraClick} className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center shadow-lg">
                                            <i data-lucide="camera" className="text-white"></i>
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="camera" onChange={handleFileChange} />
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">명함스캔</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-xl space-y-4">
                                    <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl text-sm" value={newCard.date} onChange={e => setNewCard({...newCard, date: e.target.value})} />
                                    <input type="text" placeholder="성함/회의명" className="w-full p-4 bg-slate-50 rounded-2xl text-sm" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} />
                                    <textarea placeholder="내용" className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-32" value={newCard.memo} onChange={e => setNewCard({...newCard, memo: e.target.value})}></textarea>
                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold">저장하기</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-lg">기록 목록</h2>
                                {cards.map(c => (
                                    <div key={c.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-indigo-500">
                                        <div className="flex justify-between font-bold"><span>{c.name}</span><span className="text-[10px] text-slate-400">{c.date}</span></div>
                                        <p className="text-xs text-slate-500 mt-2 whitespace-pre-wrap">{c.memo}</p>
                                        <button onClick={() => copyForAI(c)} className="mt-3 w-full py-2 bg-slate-800 text-white rounded-xl text-[10px] font-bold">AI 요약 복사</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 rounded-t-[40px] z-20">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="home"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="list"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

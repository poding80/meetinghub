<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub PRO v3.0</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [settings, setSettings] = useState({ naverId: "", googleAccount: "", isLinked: false });
            const [cards, setCards] = useState([]);
            const [status, setStatus] = useState('idle');
            const [newCard, setNewCard] = useState({ name: "", memo: "" });

            // 로컬 스토리지 데이터 불러오기
            useEffect(() => {
                const savedSet = localStorage.getItem('hyo_settings');
                const savedData = localStorage.getItem('hyo_v3_data');
                if (savedSet) setSettings(JSON.parse(savedSet));
                if (savedData) setCards(JSON.parse(savedData));
            }, []);

            // 데이터 저장 및 아이콘 업데이트
            useEffect(() => {
                localStorage.setItem('hyo_settings', JSON.stringify(settings));
                localStorage.setItem('hyo_v3_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, settings, cards, status]);

            const handleLinkAccount = (e) => {
                e.preventDefault();
                setSettings({ ...settings, isLinked: true });
                alert("🎉 서비스 연동이 성공적으로 활성화되었습니다!");
                setActiveTab('home');
            };

            const saveEntry = () => {
                if (!settings.isLinked) return alert("먼저 [설정] 탭에서 계정을 연동해 주세요! 🔒");
                if (!newCard.name) return alert("이름을 입력해 주세요!");
                setCards([{ ...newCard, id: Date.now(), date: new Date().toLocaleDateString() }, ...cards]);
                setNewCard({ name: "", memo: "" });
                alert("✅ 캘린더 자동 등록 완료!");
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl overflow-hidden">
                    {/* 상단 헤더 영역 */}
                    <div className="bg-indigo-600 p-6 text-white pt-10 rounded-b-[40px] shadow-lg flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold italic tracking-tighter">Meeting Hub PRO</h1>
                            <p className="text-indigo-100 text-[10px] font-bold opacity-80 uppercase tracking-widest">lee hyo Official Asst.</p>
                        </div>
                        <div className={`p-2 rounded-full ${settings.isLinked ? 'bg-green-400' : 'bg-red-400'} shadow-inner`}>
                            <i data-lucide={settings.isLinked ? "shield-check" : "shield-alert"} className="w-5 h-5 text-white"></i>
                        </div>
                    </div>

                    {/* 메인 콘텐츠 영역 */}
                    <div className="flex-1 p-6 overflow-y-auto pb-32">
                        {activeTab === 'home' && (
                            <div className="space-y-6 animate-in fade-in">
                                <div className="bg-slate-50 rounded-[30px] p-8 text-center border border-slate-100 shadow-inner">
                                    <button className="w-20 h-20 rounded-full bg-indigo-600 mx-auto flex items-center justify-center shadow-xl active:scale-95 transition-all">
                                        <i data-lucide="mic" className="text-white w-8 h-8"></i>
                                    </button>
                                    <h3 className="mt-4 font-bold text-slate-800">회의 기록 시작</h3>
                                    {!settings.isLinked && <p className="text-[10px] text-red-500 font-bold mt-2 animate-bounce">⚠️ 계정 연동 필요</p>}
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-100 p-6 shadow-xl space-y-4">
                                    <h2 className="font-bold text-slate-800 flex items-center text-sm uppercase">
                                        <i data-lucide="camera" className="mr-2 text-indigo-600 w-4 h-4"></i> 명함 & 메모 (Auto-Sync)
                                    </h2>
                                    <input type="text" placeholder="참석자 이름" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})}/>
                                    <textarea placeholder="메모를 남기면 캘린더로 즉시 전송됩니다. 😎" className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-24 outline-none" value={newCard.memo} onChange={e => setNewCard({...newCard, memo: e.target.value})}></textarea>
                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition">기록 저장 및 전송</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6 animate-in slide-in-from-right-4">
                                <div className="bg-white rounded-3xl border border-slate-100 p-6 shadow-xl space-y-6">
                                    <h2 className="font-bold text-slate-800 flex items-center">
                                        <i data-lucide="settings" className="mr-2 text-indigo-600"></i> 서비스 연동 설정
                                    </h2>
                                    <form onSubmit={handleLinkAccount} className="space-y-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">ClovaNote (Naver ID)</label>
                                            <input type="text" placeholder="naver_id@naver.com" className="w-full p-4 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-green-500" value={settings.naverId} onChange={e => setSettings({...settings, naverId: e.target.value})} required/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Google Calendar (Gmail)</label>
                                            <input type="email" placeholder="your_account@gmail.com" className="w-full p-4 bg-slate-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-yellow-500" value={settings.googleAccount} onChange={e => setSettings({...settings, googleAccount: e.target.value})} required/>
                                        </div>
                                        <button type="submit" className="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition">설정 저장 및 연동 활성화</button>
                                    </form>
                                    {settings.isLinked && (
                                        <div className="bg-green-50 p-4 rounded-2xl flex items-center space-x-3 border border-green-100">
                                            <i data-lucide="link" className="text-green-500 w-5 h-5"></i>
                                            <span className="text-xs text-green-700 font-bold">현재 모든 서비스가 연결되어 있습니다.</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4 animate-in fade-in">
                                <h2 className="font-bold text-slate-800 text-lg px-2 italic">Meeting History</h2>
                                {cards.length === 0 ? (
                                    <div className="py-20 text-center text-slate-300 italic text-sm">기록된 회의가 없습니다.</div>
                                ) : (
                                    cards.map(c => (
                                        <div key={c.id} className="bg-white p-5 rounded-[30px] border border-slate-100 shadow-md space-y-2 border-l-4 border-indigo-500">
                                            <div className="flex justify-between items-center">
                                                <h4 className="font-bold text-slate-800">{c.name}</h4>
                                                <span className="text-[10px] text-slate-400 font-bold">{c.date}</span>
                                            </div>
                                            <p className="text-xs text-slate-500 italic">"{c.memo}"</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </div>

                    {/* 하단 네비게이션 바 */}
                    <div className="absolute bottom-0 w-full bg-white/80 backdrop-blur-xl border-t border-slate-100 flex justify-around p-5 rounded-t-[40px] shadow-[0_-10px-40px_rgba(0,0,0,0.05)] z-20">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center transition-all ${activeTab === 'home' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <i data-lucide="home"></i><span className="text-[10px] font-bold mt-1">홈</span>
                        </button>
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center transition-all ${activeTab === 'list' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <i data-lucide="layout-list"></i><span className="text-[10px] font-bold mt-1">기록</span>
                        </button>
                        <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center transition-all ${activeTab === 'settings' ? 'text-indigo-600 scale-110' : 'text-slate-300'}`}>
                            <i data-lucide="user-cog"></i><span className="text-[10px] font-bold mt-1">설정</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

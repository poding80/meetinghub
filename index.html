<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub PRO v4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [settings, setSettings] = useState({ 
                naverId: "", naverPw: "", 
                googleId: "", googlePw: "", 
                isLinked: false 
            });
            const [cards, setCards] = useState([]);
            const [newCard, setNewCard] = useState({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });

            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedSet = localStorage.getItem('hyo_settings_v4');
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedSet) setSettings(JSON.parse(savedSet));
                if (savedData) setCards(JSON.parse(savedData));
            }, []);

            useEffect(() => {
                localStorage.setItem('hyo_settings_v4', JSON.stringify(settings));
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, settings, cards, isRecording]);

            // 1. 녹음 및 클로바노트 연동 (가상 로직)
            const handleMicClick = async () => {
                if (!settings.isLinked) return alert("설정에서 계정을 먼저 연동해주세요.");
                
                if (!isRecording) {
                    setIsRecording(true);
                    // 실제 구현 시: MediaRecorder API 사용 시작
                } else {
                    setIsRecording(false);
                    alert("녹음이 완료되었습니다. 클로바노트로 전송하여 요약본을 생성합니다...");
                    
                    // 가상 API 통신
                    const summary = "회의 요약: 프로젝트 일정 및 예산 승인 건에 대한 논의가 완료됨.";
                    const newEntry = { 
                        id: Date.now(), 
                        name: "음성 기록 요약", 
                        memo: summary, 
                        date: new Date().toLocaleDateString(),
                        type: 'voice'
                    };
                    setCards([newEntry, ...cards]);
                }
            };

            // 2. 카메라 명함 인식 (가상 로직)
            const handleCameraClick = () => {
                fileInputRef.current.click();
            };

            const handleFileChange = (e) => {
                alert("명함 이미지를 분석하여 텍스트를 추출합니다(OCR)...");
                // 실제 구현 시: Google Vision API 등 사용
                setNewCard({ ...newCard, name: "추출된 성함", memo: "회사명: OO기술 / 직함: 팀장" });
            };

            // 3. 구글 캘린더 업데이트 및 저장
            const saveEntry = async () => {
                if (!settings.isLinked) return alert("계정 연동이 필요합니다.");
                
                alert(`${newCard.date} 날짜로 구글 캘린더에 일정을 등록합니다.`);
                
                const entry = { ...newCard, id: Date.now() };
                setCards([entry, ...cards]);
                setNewCard({ name: "", memo: "", date: new Date().toISOString().split('T')[0] });
            };

            // 4. 검색 기능
            const filteredCards = cards.filter(card => 
                card.name.includes(searchQuery) || card.memo.includes(searchQuery)
            );

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg">
                        <h1 className="text-2xl font-bold italic">Meeting Hub PRO v4</h1>
                        <p className="text-indigo-200 text-[10px] font-bold uppercase tracking-widest">Advanced AI Assistant</p>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto pb-32">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                {/* 검색바 */}
                                <div className="relative">
                                    <i data-lucide="search" className="absolute left-4 top-3.5 w-4 h-4 text-slate-400"></i>
                                    <input 
                                        type="text" 
                                        placeholder="기록 검색..." 
                                        className="w-full pl-11 pr-4 py-3 bg-slate-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>

                                <div className="flex justify-around py-4">
                                    <div className="text-center">
                                        <button 
                                            onClick={handleMicClick}
                                            className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}
                                        >
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white"></i>
                                        </button>
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">녹음/요약</span>
                                    </div>
                                    <div className="text-center">
                                        <button onClick={handleCameraClick} className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center shadow-lg">
                                            <i data-lucide="camera" className="text-white"></i>
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="camera" onChange={handleFileChange} />
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">명함스캔</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-100 p-6 shadow-xl space-y-4">
                                    <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none" value={newCard.date} onChange={e => setNewCard({...newCard, date: e.target.value})} />
                                    <input type="text" placeholder="성함/회의명" className="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} />
                                    <textarea placeholder="메모 내용" className="w-full p-4 bg-slate-50 rounded-2xl text-sm h-24 outline-none" value={newCard.memo} onChange={e => setNewCard({...newCard, memo: e.target.value})}></textarea>
                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">일정 등록 및 저장</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-slate-800 text-lg italic">Search Results ({filteredCards.length})</h2>
                                {filteredCards.map(c => (
                                    <div key={c.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-indigo-500">
                                        <div className="flex justify-between">
                                            <span className="font-bold text-slate-800">{c.name}</span>
                                            <span className="text-[10px] text-slate-400">{c.date}</span>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2">{c.memo}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6">
                                <div className="bg-white rounded-3xl p-6 shadow-xl space-y-4 border border-slate-100">
                                    <h2 className="font-bold flex items-center"><i data-lucide="lock" className="mr-2 w-4 h-4 text-indigo-600"></i>보안 연동 설정</h2>
                                    <div className="space-y-3">
                                        <input type="text" placeholder="Naver ID" className="w-full p-4 bg-slate-50 rounded-2xl text-xs" value={settings.naverId} onChange={e=>setSettings({...settings, naverId:e.target.value})} />
                                        <input type="password" placeholder="Naver Password" className="w-full p-4 bg-slate-50 rounded-2xl text-xs" value={settings.naverPw} onChange={e=>setSettings({...settings, naverPw:e.target.value})} />
                                        <hr/>
                                        <input type="text" placeholder="Google ID" className="w-full p-4 bg-slate-50 rounded-2xl text-xs" value={settings.googleId} onChange={e=>setSettings({...settings, googleId:e.target.value})} />
                                        <input type="password" placeholder="Google Password" className="w-full p-4 bg-slate-100 rounded-2xl text-xs" value={settings.googlePw} onChange={e=>setSettings({...settings, googlePw:e.target.value})} />
                                    </div>
                                    <button onClick={() => {setSettings({...settings, isLinked: true}); alert("연동 완료");}} className="w-full py-4 bg-slate-800 text-white rounded-2xl font-bold">인증 정보 저장</button>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 rounded-t-[40px] z-20">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="home"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="search"></i></button>
                        <button onClick={() => setActiveTab('settings')} className={activeTab === 'settings' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="settings"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

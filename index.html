<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub AI v4.3</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [cards, setCards] = useState([]);
            const [newCard, setNewCard] = useState({ 
                name: "", 
                date: new Date().toISOString().split('T')[0],
                personInfo: "", // 명함 추출 텍스트
                personMemo: "", // 인원에 대한 메모
                voiceSummary: "" // 녹음 요약
            });

            const recognitionRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedData) setCards(JSON.parse(savedData));

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ko-KR';

                    recognitionRef.current.onresult = (event) => {
                        let current = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            current += event.results[i][0].transcript;
                        }
                        setNewCard(prev => ({ ...prev, voiceSummary: current }));
                    };

                    // 마이크 끊김 방지: 의도치 않게 멈추면 재시작
                    recognitionRef.current.onend = () => {
                        if (isRecording) recognitionRef.current.start();
                    };
                }
            }, [isRecording]);

            useEffect(() => {
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, cards, isRecording, isAnalyzing]);

            const toggleRecording = () => {
                if (isRecording) {
                    recognitionRef.current.stop();
                    setIsRecording(false);
                } else {
                    recognitionRef.current.start();
                    setIsRecording(true);
                }
            };

            const handleCameraClick = () => fileInputRef.current.click();

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsAnalyzing(true);
                try {
                    const result = await Tesseract.recognize(file, 'kor+eng');
                    const extractedText = result.data.text.trim();
                    setNewCard(prev => ({ 
                        ...prev, 
                        personInfo: extractedText,
                        name: extractedText.split('\n')[0] // 첫 줄을 보통 이름으로 추정
                    }));
                    alert("명함 분석 완료!");
                } catch (error) {
                    alert("OCR 분석 실패: " + error.message);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const saveEntry = () => {
                if (!newCard.name) return alert("회의명이나 성함을 입력하세요.");
                setCards([{ ...newCard, id: Date.now() }, ...cards]);
                setNewCard({ name: "", date: new Date().toISOString().split('T')[0], personInfo: "", personMemo: "", voiceSummary: "" });
                alert("성공적으로 저장되었습니다!");
            };

            const copyForAI = (card) => {
                const text = `[회의 요약 요청]\n일시: ${card.date}\n제목: ${card.name}\n\n1. 명함 정보:\n${card.personInfo}\n\n2. 인물 메모:\n${card.personMemo}\n\n3. 녹음 내용:\n${card.voiceSummary}\n\n위 내용을 요약하고 구글 캘린더 등록용 링크들을 만들어줘.`;
                navigator.clipboard.writeText(text);
                alert("AI 전달용 데이터가 복사되었습니다!");
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg">
                        <h1 className="text-2xl font-bold italic">Meeting Hub AI v4.3</h1>
                        <p className="text-indigo-200 text-[10px] font-bold">Tech Director's Assistant</p>
                    </div>

                    <div className="flex-1 p-6 overflow-y-auto pb-32">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-around py-4">
                                    <div className="text-center">
                                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center shadow-lg transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}>
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white"></i>
                                        </button>
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">녹음 제어</span>
                                    </div>
                                    <div className="text-center">
                                        <button onClick={handleCameraClick} disabled={isAnalyzing} className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center shadow-lg disabled:opacity-50">
                                            {isAnalyzing ? <div className="loader"></div> : <i data-lucide="camera" className="text-white"></i>}
                                        </button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" capture="camera" onChange={handleFileChange} />
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500">명함 텍스트화</span>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 p-6 shadow-xl space-y-4">
                                    <div className="flex gap-2">
                                        <input type="date" className="flex-1 p-3 bg-slate-50 rounded-xl text-sm border" value={newCard.date} onChange={e => setNewCard({...newCard, date: e.target.value})} />
                                        <input type="text" placeholder="회의명/성함" className="flex-[2] p-3 bg-slate-50 rounded-xl text-sm border" value={newCard.name} onChange={e => setNewCard({...newCard, name: e.target.value})} />
                                    </div>
                                    
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-indigo-600 ml-1">명함 추출 정보</label>
                                        <textarea placeholder="카메라 촬영 시 여기에 텍스트가 자동 추출됩니다." className="w-full p-3 bg-indigo-50/30 rounded-xl text-sm h-20 border-indigo-100 border" value={newCard.personInfo} onChange={e => setNewCard({...newCard, personInfo: e.target.value})}></textarea>
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 ml-1">인물 관련 메모</label>
                                        <input type="text" placeholder="예: 무대감독, OO협회 사무국장 등" className="w-full p-3 bg-slate-50 rounded-xl text-sm border" value={newCard.personMemo} onChange={e => setNewCard({...newCard, personMemo: e.target.value})} />
                                    </div>

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-red-400 ml-1">녹음 요약본 (실시간)</label>
                                        <textarea placeholder="마이크 인식 내용이 여기에 표시됩니다." className="w-full p-3 bg-slate-50 rounded-xl text-sm h-32 border" value={newCard.voiceSummary} onChange={e => setNewCard({...newCard, voiceSummary: e.target.value})}></textarea>
                                    </div>

                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-transform">모든 데이터 통합 저장</button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-lg flex items-center justify-between">
                                    <span>기록 아카이브</span>
                                    <span className="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">{cards.length} 건</span>
                                </h2>
                                {cards.map(c => (
                                    <div key={c.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-indigo-500 space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold text-indigo-900">{c.name}</span>
                                            <span className="text-[10px] text-slate-400">{c.date}</span>
                                        </div>
                                        <div className="text-[11px] space-y-2">
                                            {c.personInfo && <p className="text-slate-600"><strong>[명함]</strong> {c.personInfo.substring(0, 50)}...</p>}
                                            {c.personMemo && <p className="text-blue-600"><strong>[메모]</strong> {c.personMemo}</p>}
                                            {c.voiceSummary && <p className="text-slate-500 italic">" {c.voiceSummary.substring(0, 50)}... "</p>}
                                        </div>
                                        <button onClick={() => copyForAI(c)} className="w-full py-3 bg-slate-800 text-white rounded-xl text-xs font-bold flex items-center justify-center">
                                            <i data-lucide="share-2" className="w-3 h-3 mr-2"></i> AI 요약 데이터 생성
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 rounded-t-[40px] z-20">
                        <button onClick={() => setActiveTab('home')} className={activeTab === 'home' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="plus-circle"></i></button>
                        <button onClick={() => setActiveTab('list')} className={activeTab === 'list' ? 'text-indigo-600' : 'text-slate-300'}><i data-lucide="database"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>

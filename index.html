<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Hub AI v4.8</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .recording-active { animation: pulse 1.5s infinite; background-color: #ef4444 !important; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        /* 아이폰에서 입력창 클릭 시 화면 줌 방지 */
        input, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MeetingHub = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isRecording, setIsRecording] = useState(false);
            const [cards, setCards] = useState([]);
            const cumulativeTranscript = useRef("");
            const fileInputRef = useRef(null); // 카메라 호출용

            const [newCard, setNewCard] = useState({ 
                title: "", date: new Date().toISOString().split('T')[0],
                company: "", name: "", phone: "", email: "",
                personMemo: "", voiceSummary: ""
            });

            const recognitionRef = useRef(null);

            useEffect(() => {
                const savedData = localStorage.getItem('hyo_v4_data');
                if (savedData) setCards(JSON.parse(savedData));

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = true;
                    recognitionRef.current.interimResults = true;
                    recognitionRef.current.lang = 'ko-KR';

                    recognitionRef.current.onresult = (event) => {
                        let interim = "";
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const speech = event.results[i][0].transcript;
                            if (event.results[i].isFinal) cumulativeTranscript.current += speech + " ";
                            else interim += speech;
                        }
                        setNewCard(prev => ({ ...prev, voiceSummary: cumulativeTranscript.current + interim }));
                    };
                    recognitionRef.current.onend = () => { if (window.isRec) recognitionRef.current.start(); };
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('hyo_v4_data', JSON.stringify(cards));
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab, cards]);

            const toggleRecording = () => {
                window.isRec = !isRecording;
                if (isRecording) recognitionRef.current.stop();
                else recognitionRef.current.start();
                setIsRecording(!isRecording);
            };

            // 카메라/앨범에서 사진 선택 시 (아이폰 자체 기능을 쓰게 유도)
            const handlePhoto = (e) => {
                alert("사진이 선택되었습니다. 아이폰 사파리의 경우, 입력창을 다시 한번 꾹 누르면 [텍스트 스캔] 메뉴가 나타나 더 정확하게 입력할 수 있습니다.");
            };

            const saveEntry = () => {
                if (!newCard.title && !newCard.name) return alert("내용을 입력해주세요.");
                setCards([{ ...newCard, id: Date.now() }, ...cards]);
                setNewCard({ title: "", date: new Date().toISOString().split('T')[0], company: "", name: "", phone: "", email: "", personMemo: "", voiceSummary: "" });
                cumulativeTranscript.current = "";
                alert("저장 완료!");
            };

            return (
                <div className="max-w-md mx-auto bg-white min-h-screen relative flex flex-col shadow-2xl">
                    <div className="bg-indigo-700 p-6 text-white pt-12 rounded-b-[40px] shadow-lg flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-bold italic">Meeting Hub v4.8</h1>
                            <p className="text-[9px] opacity-70 font-bold uppercase">Direct Scan Engine</p>
                        </div>
                        <i data-lucide="camera" className="w-6 h-6 text-indigo-300"></i>
                    </div>

                    <div className="flex-1 p-5 overflow-y-auto pb-32">
                        {activeTab === 'home' ? (
                            <div className="space-y-4">
                                {/* 마이크 & 카메라 버튼 */}
                                <div className="flex justify-around py-4 bg-white rounded-3xl shadow-sm border border-slate-100">
                                    <div className="text-center">
                                        <button onClick={toggleRecording} className={`w-16 h-16 rounded-full flex items-center justify-center shadow-xl transition-all ${isRecording ? 'recording-active' : 'bg-indigo-600'}`}>
                                            <i data-lucide={isRecording ? "square" : "mic"} className="text-white w-6 h-6"></i>
                                        </button>
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500 uppercase">Voice REC</span>
                                    </div>
                                    <div className="text-center">
                                        <button onClick={() => fileInputRef.current.click()} className="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center shadow-xl">
                                            <i data-lucide="camera" className="text-white w-6 h-6"></i>
                                        </button>
                                        <input 
                                            type="file" 
                                            ref={fileInputRef} 
                                            className="hidden" 
                                            accept="image/*" 
                                            capture="camera" 
                                            onChange={handlePhoto} 
                                        />
                                        <span className="text-[10px] mt-2 block font-bold text-slate-500 uppercase">Card Scan</span>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <div className="flex gap-2">
                                        <input type="date" className="flex-1 p-3 bg-white border rounded-xl text-xs" value={newCard.date} onChange={e=>setNewCard({...newCard, date:e.target.value})} />
                                        <input type="text" placeholder="회의/미팅 제목" className="flex-[2] p-3 bg-white border rounded-xl text-xs font-bold" value={newCard.title} onChange={e=>setNewCard({...newCard, title:e.target.value})} />
                                    </div>

                                    {/* 명함 입력 섹션 - 아이폰 텍스트 스캔에 최적화 */}
                                    <div className="grid grid-cols-2 gap-2 bg-indigo-50/30 p-4 rounded-2xl border border-indigo-100">
                                        <div className="col-span-2 text-[10px] font-bold text-indigo-600 mb-1">명함 정보 (입력칸을 꾹 눌러 [텍스트 스캔] 하세요)</div>
                                        <input type="text" placeholder="성함" className="p-3 bg-white border rounded-xl text-xs" value={newCard.name} onChange={e=>setNewCard({...newCard, name:e.target.value})} />
                                        <input type="text" placeholder="소속" className="p-3 bg-white border rounded-xl text-xs" value={newCard.company} onChange={e=>setNewCard({...newCard, company:e.target.value})} />
                                        <input type="text" placeholder="연락처" className="p-3 bg-white border rounded-xl text-xs" value={newCard.phone} onChange={e=>setNewCard({...newCard, phone:e.target.value})} />
                                        <input type="text" placeholder="이메일" className="p-3 bg-white border rounded-xl text-xs" value={newCard.email} onChange={e=>setNewCard({...newCard, email:e.target.value})} />
                                    </div>

                                    <textarea placeholder="인물/회의 추가 메모" className="w-full p-4 bg-white border rounded-2xl text-xs h-24" value={newCard.personMemo} onChange={e=>setNewCard({...newCard, personMemo:e.target.value})}></textarea>
                                    
                                    <div className="space-y-1">
                                        <p className="text-[10px] font-bold text-red-500 ml-1 italic">실시간 누적 기록</p>
                                        <textarea className="w-full p-4 bg-slate-100 border rounded-2xl text-xs h-32 italic text-slate-600" value={newCard.voiceSummary} readOnly></textarea>
                                    </div>

                                    <button onClick={saveEntry} className="w-full py-4 bg-indigo-700 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                                        <i data-lucide="check-circle" className="w-5 h-5"></i> 데이터 통합 저장
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h2 className="font-bold text-lg flex justify-between items-center">기록함 <span>{cards.length}</span></h2>
                                {cards.map(c => (
                                    <div key={c.id} className="bg-white p-4 rounded-3xl border shadow-md border-l-4 border-indigo-600 space-y-3">
                                        <div className="flex justify-between items-start">
                                            <div><p className="font-bold text-sm">[{c.title || '기록'}] {c.name}</p><p className="text-[9px] text-slate-400">{c.date} | {c.company}</p></div>
                                            <button onClick={()=>setCards(cards.filter(i=>i.id!==c.id))} className="text-slate-200"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                        </div>
                                        <button onClick={() => {
                                            const text = `[회의 요약]\n날짜: ${c.date}\n성함: ${c.name}(${c.company})\n연락처: ${c.phone}\n메모: ${c.personMemo}\n기록: ${c.voiceSummary}`;
                                            navigator.clipboard.writeText(text);
                                            alert("복사 완료!");
                                        }} className="w-full py-2 bg-slate-800 text-white rounded-xl text-[10px] font-bold uppercase">Copy for Gemini</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="absolute bottom-0 w-full bg-white/95 backdrop-blur-md border-t flex justify-around p-6 rounded-t-[40px] shadow-2xl z-30">
                        <button onClick={()=>setActiveTab('home')} className={activeTab==='home'?'text-indigo-600 scale-110':'text-slate-300'}><i data-lucide="edit"></i></button>
                        <button onClick={()=>setActiveTab('list')} className={activeTab==='list'?'text-indigo-600 scale-110':'text-slate-300'}><i data-lucide="archive"></i></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MeetingHub />);
    </script>
</body>
</html>
